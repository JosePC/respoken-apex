<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Respoken</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="">
<link rel="icon" type="image/png" href="fingerprint.png">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #dbe8d6;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  img.mark {
    /* Sized to feel present without dominating; scales down on
       phones so the gesture stays the same at any viewport. */
    width: min(38vw, 38vh, 360px);
    height: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
</style>
</head>
<body>
  <img class="mark" src="fingerprint.png" alt="Respoken">
</body>
